# Zotero Configuration File
# -------------------------
# This file contains credentials needed to download PDFs from your Zotero library.
#
# Parameters:
#   zotero.user - Your Zotero username
#   zotero.api_key - Your Zotero API key (can be generated in Zotero settings: https://www.zotero.org/settings/keys)
#   zotero.group - The name/path of the Zotero collection you want to download
#   zotero.output_dir - The exact directory where PDFs will be saved
#
# Usage:
#   ./prismAId_OS_CPU[.exe] --download-zotero path/to/zotero-config.toml
#
# Optional RevAIse documentation can be enabled with a [revaise] block.
#
# Example values (replace with your own credentials):
[zotero]
user = "your_username"
api_key = "your_api_key"
group = "your_collection_name"
output_dir = "papers/zotero"
